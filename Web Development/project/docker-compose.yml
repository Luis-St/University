services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    image: cookbook-server:latest
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      - PORT=${SERVER_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=${VITE_API_URL}
    image: cookbook-client:latest
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    environment:
      - PORT=${CLIENT_PORT}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
