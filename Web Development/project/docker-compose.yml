services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "3030:3030"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cookbook
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo-data:
